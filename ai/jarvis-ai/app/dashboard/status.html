<!DOCTYPE html>
<html>
<head>
<title>Jarvis Core</title>

<style>
body{
    background:#0b0f14;
    color:#00ff9c;
    font-family:monospace;
}

.active{
    color:#ff4d4d;
    font-weight:bold;
}

.inactive{
    color:#00ff9c;
    opacity:0.6;
}

.box{
    border:1px solid #00ff9c;
    padding:10px;
    margin:10px;
}

.title{
    color:#00ffaa;
    font-weight:bold;
}
</style>

</head>

<body>

<h2>JARVIS CORE RUNTIME</h2>

<div id="global_status" class="box"></div>
<div id="runtime" class="box"></div>
<div id="health" class="box"></div>
<div id="performance" class="box"></div>
<div id="history" class="box"></div>
<div id="learning" class="box"></div>
<div id="signals" class="box"></div>
<div id="decision" class="box"></div>

<script>

let dashboardLoop = null;

function stateColor(v){
    if(v==="critical") return "bad";
    if(v==="warning") return "warn";
    if(v==="increasing") return "warn";
    if(v==="high") return "bad";
    if(v==="medium") return "warn";
    return "good";
}

async function load(){

    try{

        let url = window.location.origin + "/status";

        console.log("FETCH URL:", url);

        let r = await fetch(url);
        if(!r.ok) throw new Error("Status request failed");

        let d = await r.json();

        // ================= DATA =================

        let e = d.inference?.engine || {};
        let learning = e.learning || {};

        // ================= GLOBAL =================

        let signals = e.signals || [];

        let highest = 0;

        if(Array.isArray(signals)){
            signals.forEach(s=>{
                let lvl = s.level ?? 0;

                if(lvl > highest) highest = lvl;

            });
        } else {
            console.warn("signals not array:", signals);
        }

        "STATE: "+
        (e.state ?? "unknown").toUpperCase()

        let errorCount = 0;
        if(e.error_types){
            errorCount = Object.values(e.error_types).reduce((a,b)=>a+b,0);
            }

        // ================= GLOBAL =================

        let el = document.getElementById("global_status");
        if(el){
            el.innerHTML =
                "<div class='title'>RUNTIME STATUS</div>"+
                "<div>"+
                "STATE: <span class='"+stateColor(instability)+"'>"+
                (instability || "stable").toUpperCase()+
                "</span>"+
                " | REQUESTS: "+(e.total_requests ?? 0)+
                " | ERRORS: "+errorCount+
                " | HEALTH: "+(e.health ? e.health : "unknown").toUpperCase()+
                "</div>";
        }

        // ================= RUNTIME =================

        el = document.getElementById("runtime");
        if(el){
            el.innerHTML =
                "<div class='box'><div class='title'>RUNTIME</div>"+
                "STATE: "+(e.state ?? "unknown")+"<br>"+
                "UPTIME: "+(e.uptime ?? 0)+"<br>"+
                "BUSY: "+(e.busy ?? false)+"<br>"+
                "WORKER: "+(e.worker_status ?? "unknown")+"<br>"+
                "QUEUE: "+(e.queue ?? 0)+"/"+(e.queue_limit ?? 0)+"<br>"+
                "</div>";
        }

        // ================= HEALTH =================

        el = document.getElementById("health");
        if(el){
            el.innerHTML =
                "<div class='box'><div class='title'>HEALTH</div>"+
                "ERRORS: "+errorCount+"<br>"+
                "TIMEOUTS: "+(e.timeouts ?? 0)+"<br>"+
                "SUCCESS: "+(e.success_requests ?? 0)+"<br>"+
                "SIGNAL LOAD: "+(highest ?? 0).toFixed(2)+"<br>"+
                "</div>";
        }

        // ================= PERFORMANCE =================

        el = document.getElementById("performance");
        if(el){
            el.innerHTML =
                "<div class='box'><div class='title'>PERFORMANCE</div>"+
                "TOKENS/SEC: "+(e.tokens_per_sec ?? 0)+"<br>"+
                "AVG TIME: "+(e.avg_duration ?? 0)+"<br>"+
                "</div>";
        }

        // ================= HISTORY =================

        let history_html = "<div class='box'><div class='title'>HISTORY</div>";

        (e.history || []).slice(-10).reverse().forEach(r=>{
            history_html += (r.request_id || "unknown")+" | "+(r.duration || 0)+"s<br>";
        });

        history_html += "</div>";

        el = document.getElementById("history");
        if(el){
            el.innerHTML = history_html;
        }

        // ================= LEARNING =================

        let learning_html = "<div class='box'><div class='title'>LEARNING</div>";

        if (!learning || Object.keys(learning).length === 0){

            learning_html += "no data";

        } else {

            for (let action in learning){

                learning_html += "<b>"+action+"</b><br>";

                let ctxs = learning[action] || {};

                for (let ctx in ctxs){

                    let s = ctxs[ctx] || {};

                    learning_html +=
                        "&nbsp;&nbsp;"+ctx+
                        " → G="+(s.GOOD || 0).toFixed(1)+
                        " B="+(s.BAD || 0).toFixed(1)+
                        " N="+(s.NEUTRAL || 0).toFixed(1)+"<br>";
                }

                learning_html += "<br>";
            }
        }

        learning_html += "</div>";

        el = document.getElementById("learning");
        if(el){
            el.innerHTML = learning_html;
        }

        // ================= SIGNALS =================

        let signals_html = "<div class='box'><div class='title'>SIGNALS</div>";

        if(Array.isArray(signals)){

            signals.forEach(s=>{

                signals_html +=
                    s.type +
                    " | lvl=" + (s.level ?? 0).toFixed(2) +
                    " | trend=" + s.trend +
                    "<br>";
            });
        } else {
            console.warn("signals not array:", signals);
        }

        signals_html += "</div>";

        let signals_el = document.getElementById("signals");
        if(signals_el){
            signals_el.innerHTML = signals_html;
        }

        // ================= DECISION =================

        let decision_html = "<div class='box'><div class='title'>DECISION</div>";

        let decision = e.decision;
        let meta = decision?.meta || {};

        let decision_history = e.decision_history || [];

        if(decision.decision_type === "none"){
            decision_html +=
                "type: NONE<br>" +
                "reason: " + (decision.reasoning ?? "n/a") + "<br>" +
                "active: " + (meta.active ?? "?") + "/" + (meta.required ?? "?") + "<br>" +
                "missing: " + ((meta.missing || []).join(", ") || "none") + "<br>";
        }
        else{
            decision_html +=
                "confidence: " + (decision.confidence ?? 0).toFixed(3) + "<br>" +
                "priority: " + (decision.priority ?? 0) + "<br>" +
                "reason: " + (decision.reasoning ?? "n/a") + "<br>" +

                "base: " + (meta.base_confidence ?? "n/a") + "<br>" +
                "adj: " + (meta.learning_adjustment ?? 0.0) + "<br>" +
                "final: " + (meta.final_confidence ?? "n/a") + "<br>";
        }

        decision_html += "<br><b>HISTORY</b><br>";

        if(Array.isArray(decision_history) && decision_history.length > 0){
            decision_history.slice().reverse().forEach(d=>{
                decision_html +=
                    "type=" + (d.decision_type ?? "?") +
                    " | c=" + (d.confidence ?? 0).toFixed(3) +
                    " | p=" + (d.priority ?? 0) +
                    "<br>";
            });
        } else {
            decision_html += "no history<br>";
        }

decision_html += "</div>";

        let decision_el = document.getElementById("decision");
        if(decision_el){
            decision_el.innerHTML = decision_html;
        }

        } catch(err){

            console.error("Dashboard load failed:", err);

            // keep loop alive for recovery

            let errBox = document.getElementById("global_status");

            if(errBox){
                errBox.innerHTML =
                    "<div class='title'>DASHBOARD ERROR</div>" +
                    "<div style='color:red'>" +
                    "message: " + err.message + "<br>" +
                    "type: " + err.name +
                    "</div>";
            }
    }
}

// ================= LOOP =================

function startLoop(){
    if(dashboardLoop) clearInterval(dashboardLoop);
    dashboardLoop = setInterval(load, 1000);
}

window.onload = () => {
    load().then(startLoop);
};


</script>

</body>
</html>
